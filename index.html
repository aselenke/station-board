<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stations</title>
    <style>
    /* ---------- layout & type ---------- */
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0; padding: 24px;
      background: #f5f5f4; color: #1c1c1a;
    }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 2px; }
    .subtitle { color: #6b6b66; margin: 0 0 20px; font-size: 14px; }

    /* ---------- filter buttons ---------- */
    .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filters button {
      border: 1px solid #d6d6d1; background: #fff; color: #1c1c1a;
      padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 14px;
    }
    .filters button.active { background: #1c1c1a; color: #fff; border-color: #1c1c1a; }

    /* ---------- cards (flexbox grid) ---------- */
    #board { display: flex; flex-wrap: wrap; gap: 16px; }
    .card {
      background: #fff; border: 1px solid #e4e4df; border-radius: 12px;
      padding: 16px; width: 220px;
    }
    .card h3 { margin: 0 0 8px; font-size: 16px; font-weight: 600; }
    .card .output { color: #6b6b66; font-size: 14px; margin: 0; }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 500; margin-bottom: 10px; text-transform: capitalize;
    }
    .badge.running { background: #e3f3e6; color: #1f6b2e; }
    .badge.idle    { background: #fdf3dd; color: #8a5a00; }
    .badge.down    { background: #fbe4e4; color: #a32020; }

    /* ---------- loading / empty / error messages ---------- */
    .message { color: #6b6b66; padding: 20px 0; font-size: 14px; }

    /* ---------- add form ---------- */
    form { margin-top: 28px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    input, select {
      padding: 8px 10px; border: 1px solid #d6d6d1; border-radius: 8px;
      font-size: 14px; font-family: inherit;
    }
    form button {
      padding: 8px 16px; border: none; border-radius: 8px;
      background: #2b6cb0; color: #fff; cursor: pointer; font-size: 14px;
    }
  </style>
</head>
<body>
    <div id="board"></div>
    <script>
        const API = "api/stations";
        const board = document.getElementById("board");

        async function loadStations() {
            board.innerHTML = '<p class="message">Loading...</p>';

            try {
                const response = await fetch(API);
                if (!response.ok) throw new Error(`Status ${response.status}`);
                const stations = await response.json();
                render(stations);
            } catch (err) {
                board.innerHTML = `<p class="message">Error loading stations. (${err.message})</p>`;
            }
        }

        function render(stations) {
            if (!stations.length) {board.innerHTML = '<p class="message">No stations found.</p>'; return;}
            board.innerHTML = stations.map((station) => `
                <div class="card">
                    <span class="badge ${station.status}"> ${station.status} </span>
                    <h3 class="card-title">${station.name}</h3>
                    <p class="output">Output: ${station.output}</p>
                </div>`).join("");
        }
        loadStations();
    </script>
</body>
</html>
